spring:
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  datasource:
    hikari:
      maximum-pool-size: ${SECUREAUTHX_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${SECUREAUTHX_DB_MIN_IDLE:2}
      connection-timeout: ${SECUREAUTHX_DB_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${SECUREAUTHX_DB_VALIDATION_TIMEOUT_MS:5000}
      max-lifetime: ${SECUREAUTHX_DB_MAX_LIFETIME_MS:1800000}
      leak-detection-threshold: ${SECUREAUTHX_DB_LEAK_DETECTION_THRESHOLD_MS:60000}
  data:
    redis:
      timeout: 2s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

server:
  port: ${SECUREAUTHX_SERVER_PORT:8080}
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 2048
  tomcat:
    threads:
      max: ${SECUREAUTHX_TOMCAT_MAX_THREADS:200}
      min-spare: ${SECUREAUTHX_TOMCAT_MIN_SPARE:10}
    connection-timeout: ${SECUREAUTHX_TOMCAT_CONNECTION_TIMEOUT:5000}
    max-connections: ${SECUREAUTHX_TOMCAT_MAX_CONNECTIONS:10000}
    accept-count: ${SECUREAUTHX_TOMCAT_ACCEPT_COUNT:100}
    max-swallow-size: 2MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: secureauthx
    distribution:
      slo:
        http.server.requests: 10ms,50ms,100ms,200ms,500ms,1s,2s
      percentiles-histogram:
        http.server.requests: true

logging:
  level:
    root: ${SECUREAUTHX_LOG_LEVEL:INFO}
    com.secureauthx: ${SECUREAUTHX_APP_LOG_LEVEL:INFO}
    org.springframework.security: ${SECUREAUTHX_SECURITY_LOG_LEVEL:INFO}
    org.springframework.web: ${SECUREAUTHX_SPRING_WEB_LOG_LEVEL:INFO}
    org.hibernate.SQL: ${SECUREAUTHX_HIBERNATE_SQL_LOG_LEVEL:WARN}
