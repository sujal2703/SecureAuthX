spring:
  application:
    name: secureauthx-server
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:postgresql://${SECUREAUTHX_POSTGRES_HOST:localhost}:${SECUREAUTHX_POSTGRES_PORT:5432}/${SECUREAUTHX_POSTGRES_DB:secureauthx}
    username: ${SECUREAUTHX_POSTGRES_USER:secureauthx}
    password: ${SECUREAUTHX_POSTGRES_PASSWORD}
    hikari:
      pool-name: SecureAuthXHikariPool
      maximum-pool-size: ${SECUREAUTHX_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${SECUREAUTHX_DB_MIN_IDLE:2}
      connection-timeout: ${SECUREAUTHX_DB_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${SECUREAUTHX_DB_VALIDATION_TIMEOUT_MS:5000}
  data:
    redis:
      host: ${SECUREAUTHX_REDIS_HOST:localhost}
      port: ${SECUREAUTHX_REDIS_PORT:6379}
      password: ${SECUREAUTHX_REDIS_PASSWORD:}
      timeout: ${SECUREAUTHX_REDIS_TIMEOUT:2s}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

server:
  port: ${SECUREAUTHX_SERVER_PORT:8080}
  shutdown: graceful
  compression:
    enabled: true

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    db:
      enabled: true
    redis:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    root: ${SECUREAUTHX_LOG_LEVEL:INFO}
    com.secureauthx: ${SECUREAUTHX_APP_LOG_LEVEL:INFO}
    org.springframework.security: ${SECUREAUTHX_SECURITY_LOG_LEVEL:INFO}
