spring:
  application:
    name: secureauthx-server
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  profiles:
    active: ${SECUREAUTHX_PROFILE:local}
  datasource:
    url: jdbc:postgresql://${SECUREAUTHX_POSTGRES_HOST:localhost}:${SECUREAUTHX_POSTGRES_PORT:5432}/${SECUREAUTHX_POSTGRES_DB:secureauthx}
    username: ${SECUREAUTHX_POSTGRES_USER:secureauthx}
    password: ${SECUREAUTHX_POSTGRES_PASSWORD}
    hikari:
      pool-name: SecureAuthXHikariPool
  data:
    redis:
      host: ${SECUREAUTHX_REDIS_HOST:localhost}
      port: ${SECUREAUTHX_REDIS_PORT:6379}
      password: ${SECUREAUTHX_REDIS_PASSWORD:}
      timeout: ${SECUREAUTHX_REDIS_TIMEOUT:2s}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

server:
  port: ${SECUREAUTHX_SERVER_PORT:8080}
  shutdown: graceful
  compression:
    enabled: true

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    db:
      enabled: true
    redis:
      enabled: true
  metrics:
    tags:
      application: secureauthx

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha

secureauthx:
  jwt:
    access-token-expiration-minutes: ${SECUREAUTHX_JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
    refresh-token-expiration-days: ${SECUREAUTHX_JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}
  oidc:
    issuer: ${SECUREAUTHX_OIDC_ISSUER:http://localhost:8080}
  rate-limiting:
    enabled: ${SECUREAUTHX_RATE_LIMITING_ENABLED:false}
    default-requests-per-minute: ${SECUREAUTHX_RATE_LIMIT_DEFAULT_RPM:60}
    default-requests-per-hour: ${SECUREAUTHX_RATE_LIMIT_DEFAULT_RPH:1000}
  cors:
    allowed-origins: ${SECUREAUTHX_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

logging:
  level:
    root: ${SECUREAUTHX_LOG_LEVEL:INFO}
    com.secureauthx: ${SECUREAUTHX_APP_LOG_LEVEL:INFO}
    org.springframework.security: ${SECUREAUTHX_SECURITY_LOG_LEVEL:INFO}
