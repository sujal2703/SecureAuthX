name: secureauthx

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${SECUREAUTHX_POSTGRES_DB:?SECUREAUTHX_POSTGRES_DB is required}
      POSTGRES_USER: ${SECUREAUTHX_POSTGRES_USER:?SECUREAUTHX_POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${SECUREAUTHX_POSTGRES_PASSWORD:?SECUREAUTHX_POSTGRES_PASSWORD is required}
    ports:
      - "${SECUREAUTHX_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: >
      sh -c 'redis-server --appendonly yes --requirepass "$$SECUREAUTHX_REDIS_PASSWORD"'
    environment:
      SECUREAUTHX_REDIS_PASSWORD: ${SECUREAUTHX_REDIS_PASSWORD:?SECUREAUTHX_REDIS_PASSWORD is required}
    ports:
      - "${SECUREAUTHX_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${SECUREAUTHX_REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend/server
    environment:
      SECUREAUTHX_SERVER_PORT: ${SECUREAUTHX_SERVER_PORT:-8080}
      SECUREAUTHX_POSTGRES_HOST: postgres
      SECUREAUTHX_POSTGRES_PORT: 5432
      SECUREAUTHX_POSTGRES_DB: ${SECUREAUTHX_POSTGRES_DB:?SECUREAUTHX_POSTGRES_DB is required}
      SECUREAUTHX_POSTGRES_USER: ${SECUREAUTHX_POSTGRES_USER:?SECUREAUTHX_POSTGRES_USER is required}
      SECUREAUTHX_POSTGRES_PASSWORD: ${SECUREAUTHX_POSTGRES_PASSWORD:?SECUREAUTHX_POSTGRES_PASSWORD is required}
      SECUREAUTHX_REDIS_HOST: redis
      SECUREAUTHX_REDIS_PORT: 6379
      SECUREAUTHX_REDIS_PASSWORD: ${SECUREAUTHX_REDIS_PASSWORD:?SECUREAUTHX_REDIS_PASSWORD is required}
      SECUREAUTHX_LOG_LEVEL: ${SECUREAUTHX_LOG_LEVEL:-INFO}
      SECUREAUTHX_APP_LOG_LEVEL: ${SECUREAUTHX_APP_LOG_LEVEL:-INFO}
      SECUREAUTHX_SECURITY_LOG_LEVEL: ${SECUREAUTHX_SECURITY_LOG_LEVEL:-INFO}
    ports:
      - "${SECUREAUTHX_SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

volumes:
  postgres-data:
  redis-data:
